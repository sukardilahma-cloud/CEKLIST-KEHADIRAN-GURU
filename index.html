<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cek Kehadiran Guru</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    .jam-btn.active { background: var(--primary); color: white; }
    body { box-sizing: border-box; }
  </style>
 <script src="/_sdk/telemetry_sdk.js"></script></head>
 <body class="h-full">
  <div id="app" class="h-full w-full bg-slate-50 overflow-auto" style="--primary:#2563eb; --surface:#ffffff; --text:#1e293b; --primary-action:#2563eb; --secondary-action:#64748b;">
   <div class="max-w-6xl mx-auto p-4 sm:p-6">
    
    <div class="flex justify-between items-start mb-6">
     <div>
      <h1 id="page-title" class="text-2xl font-bold text-slate-800">Cek Kehadiran Guru</h1>
      <p id="admin-status" class="text-xs text-slate-500 mt-1">📌 Belum login</p>
     </div>
     <button id="login-btn" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition"> 
      <i data-lucide="log-in" class="w-4 h-4 inline mr-1"></i> Login Admin 
     </button>
    </div>

    <div id="guru-view" class="block">
     <div class="mb-5">
      <label class="block text-sm font-medium text-slate-700 mb-2">Pilih Kelas:</label> 
      <select id="kelas-select" class="border border-slate-200 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500"> 
       <option value="">-- Pilih Kelas --</option> 
      </select>
     </div>
     <div class="flex items-center gap-3 mb-5">
      <i data-lucide="calendar" class="w-5 h-5 text-blue-600"></i> 
      <input type="date" id="date-picker" class="border border-slate-200 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
     </div>
     <div class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
      <div class="overflow-x-auto">
       <table class="w-full text-sm">
        <thead class="bg-slate-50 border-b border-slate-200">
         <tr>
          <th class="px-4 py-3 text-left font-semibold text-slate-600">Jam</th>
          <th class="px-4 py-3 text-left font-semibold text-slate-600">Mapel</th>
          <th class="px-4 py-3 text-left font-semibold text-slate-600">Guru</th>
          <th class="px-4 py-3 text-center font-semibold text-slate-600">Cek Hadir</th>
          <th class="px-4 py-3 text-left font-semibold text-slate-600">Keterangan</th>
         </tr>
        </thead>
        <tbody id="table-body">
         <tr>
          <td colspan="5" class="p-8 text-center text-slate-400">
           <p>Silahkan pilih kelas terlebih dahulu untuk menampilkan jadwal.</p>
          </td>
         </tr>
        </tbody>
       </table>
      </div>
     </div>
    </div>

    <div id="admin-view" class="hidden">
     <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <button id="btn-kelas" class="p-4 bg-gradient-to-br from-blue-500 to-blue-600 text-white rounded-xl font-medium hover:shadow-lg transition"><i data-lucide="book" class="w-5 h-5 inline mr-2"></i>Kelola Kelas</button> 
      <button id="btn-guru" class="p-4 bg-gradient-to-br from-green-500 to-green-600 text-white rounded-xl font-medium hover:shadow-lg transition"><i data-lucide="users" class="w-5 h-5 inline mr-2"></i>Kelola Guru</button> 
      <button id="btn-jadwal" class="p-4 bg-gradient-to-br from-purple-500 to-purple-600 text-white rounded-xl font-medium hover:shadow-lg transition"><i data-lucide="calendar" class="w-5 h-5 inline mr-2"></i>Kelola Jadwal</button>
     </div>

     <div id="kelas-tab" class="hidden mb-6">
      <h2 class="text-xl font-bold text-slate-800 mb-4">📚 Daftar Kelas</h2>
      <div class="flex gap-2 mb-4">
       <input type="text" id="kelas-input" placeholder="Nama kelas (contoh: XII IPA 1)" class="flex-1 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"> 
       <button id="btn-add-kelas" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700"><i data-lucide="plus" class="w-4 h-4 inline mr-1"></i>Tambah</button>
      </div>
      <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
       <table class="w-full text-sm">
        <thead class="bg-slate-50 border-b border-slate-200">
         <tr>
          <th class="px-4 py-3 text-left font-semibold">Nama Kelas</th>
          <th class="px-4 py-3 text-center font-semibold">Aksi</th>
         </tr>
        </thead>
        <tbody id="kelas-list"></tbody>
       </table>
      </div>
     </div>

     <div id="guru-tab" class="hidden mb-6">
      <h2 class="text-xl font-bold text-slate-800 mb-4">👨‍🏫 Daftar Guru</h2>
      <div class="flex gap-2 mb-4">
       <input type="text" id="guru-input" placeholder="Nama guru" class="flex-1 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"> 
       <button id="btn-add-guru" class="px-4 py-2 bg-green-600 text-white rounded-lg text-sm font-medium hover:bg-green-700"><i data-lucide="plus" class="w-4 h-4 inline mr-1"></i>Tambah</button>
      </div>
      <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
       <table class="w-full text-sm">
        <thead class="bg-slate-50 border-b border-slate-200">
         <tr>
          <th class="px-4 py-3 text-left font-semibold">Nama Guru</th>
          <th class="px-4 py-3 text-center font-semibold">Aksi</th>
         </tr>
        </thead>
        <tbody id="guru-list"></tbody>
       </table>
      </div>
     </div>

     <div id="jadwal-tab" class="hidden mb-6">
      <h2 class="text-xl font-bold text-slate-800 mb-4">📅 Daftar Jadwal Mengajar</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-5 gap-2 mb-4">
       <select id="jadwal-kelas" class="border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"> <option value="">-- Pilih Kelas --</option> </select> 
       <select id="jadwal-guru" class="border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"> <option value="">-- Pilih Guru --</option> </select> 
       <input type="text" id="jadwal-mapel" placeholder="Mapel" class="border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"> 
       <input type="number" id="jadwal-jam" placeholder="Jam (1-6)" min="1" max="6" class="border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"> 
       <button id="btn-add-jadwal" class="px-4 py-2 bg-purple-600 text-white rounded-lg text-sm font-medium hover:bg-purple-700"><i data-lucide="plus" class="w-4 h-4 inline mr-1"></i>Tambah</button>
      </div>
      <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
       <table class="w-full text-sm">
        <thead class="bg-slate-50 border-b border-slate-200">
         <tr>
          <th class="px-4 py-3 text-left font-semibold">Kelas</th>
          <th class="px-4 py-3 text-left font-semibold">Jam</th>
          <th class="px-4 py-3 text-left font-semibold">Mapel</th>
          <th class="px-4 py-3 text-left font-semibold">Guru</th>
          <th class="px-4 py-3 text-center font-semibold">Aksi</th>
         </tr>
        </thead>
        <tbody id="jadwal-list"></tbody>
       </table>
      </div>
     </div>
    </div>

    <div id="login-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
     <div class="bg-white rounded-xl p-6 w-96 shadow-lg">
      <h2 class="text-lg font-bold text-slate-800 mb-4">Login Admin</h2>
      <input type="text" id="admin-name" placeholder="Masukkan nama admin" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
      <div class="flex gap-3">
       <button id="login-confirm" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition">Login</button> 
       <button id="login-cancel" class="flex-1 px-4 py-2 bg-slate-200 text-slate-800 rounded-lg text-sm font-medium hover:bg-slate-300 transition">Batal</button>
      </div>
     </div>
    </div>

    <div id="save-indicator" class="fixed bottom-4 right-4 bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-medium shadow-lg opacity-0 transition-opacity duration-300 z-50">
     <i data-lucide="check" class="w-4 h-4 inline mr-1"></i> Tersimpan
    </div>

   </div>
  </div>

  <script>
const defaultConfig = {
  page_title: "Cek Kehadiran Guru",
  background_color: "#f8fafc",
  surface_color: "#ffffff",
  text_color: "#1e293b",
  primary_color: "#2563eb",
  secondary_color: "#64748b",
  font_family: "Plus Jakarta Sans",
  font_size: 14
};

let allRecords = [];
let isAdminLoggedIn = false;
let adminName = "";
let selectedDate = new Date().toISOString().split('T')[0];
let selectedKelas = "";

// Set date picker default value
document.getElementById('date-picker').value = selectedDate;

// LOGIN FUNCTIONS
document.getElementById('login-btn').addEventListener('click', () => {
  if (isAdminLoggedIn) {
    isAdminLoggedIn = false;
    adminName = "";
    updateAdminStatus();
  } else {
    document.getElementById('login-modal').classList.remove('hidden');
    document.getElementById('admin-name').focus();
  }
});

document.getElementById('login-confirm').addEventListener('click', () => {
  const name = document.getElementById('admin-name').value.trim();
  if (name) {
    isAdminLoggedIn = true;
    adminName = name;
    document.getElementById('login-modal').classList.add('hidden');
    document.getElementById('admin-name').value = '';
    updateAdminStatus();
  }
});

document.getElementById('login-cancel').addEventListener('click', () => {
  document.getElementById('login-modal').classList.add('hidden');
  document.getElementById('admin-name').value = '';
});

document.getElementById('admin-name').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    document.getElementById('login-confirm').click();
  }
});

function updateAdminStatus() {
  const statusEl = document.getElementById('admin-status');
  const loginBtn = document.getElementById('login-btn');
  const guruView = document.getElementById('guru-view');
  const adminView = document.getElementById('admin-view');

  if (isAdminLoggedIn) {
    statusEl.textContent = `✅ Admin: ${adminName}`;
    statusEl.className = 'text-xs text-green-600 mt-1 font-medium';
    loginBtn.innerHTML = '<i data-lucide="log-out" class="w-4 h-4 inline mr-1"></i> Logout';
    loginBtn.className = 'px-4 py-2 bg-red-600 text-white rounded-lg text-sm font-medium hover:bg-red-700 transition';
    guruView.classList.replace('block', 'hidden');
    adminView.classList.remove('hidden');
    renderAdminView();
  } else {
    statusEl.textContent = '📌 Belum login';
    statusEl.className = 'text-xs text-slate-500 mt-1';
    loginBtn.innerHTML = '<i data-lucide="log-in" class="w-4 h-4 inline mr-1"></i> Login Admin';
    loginBtn.className = 'px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition';
    adminView.classList.add('hidden');
    guruView.classList.replace('hidden', 'block');
    initGuruView();
    renderGuruTable();
  }
  lucide.createIcons();
}

// ADMIN TAB NAVIGATION
document.getElementById('btn-kelas').addEventListener('click', () => {
  document.getElementById('kelas-tab').classList.remove('hidden');
  document.getElementById('guru-tab').classList.add('hidden');
  document.getElementById('jadwal-tab').classList.add('hidden');
  renderKelasList();
});

document.getElementById('btn-guru').addEventListener('click', () => {
  document.getElementById('kelas-tab').classList.add('hidden');
  document.getElementById('guru-tab').classList.remove('hidden');
  document.getElementById('jadwal-tab').classList.add('hidden');
  renderGuruList();
});

document.getElementById('btn-jadwal').addEventListener('click', () => {
  document.getElementById('kelas-tab').classList.add('hidden');
  document.getElementById('guru-tab').classList.add('hidden');
  document.getElementById('jadwal-tab').classList.remove('hidden');
  updateJadwalSelects();
  renderJadwalList();
});

// KELAS FUNCTIONS
document.getElementById('btn-add-kelas').addEventListener('click', async () => {
  const nama = document.getElementById('kelas-input').value.trim();
  if (!nama) return alert('Nama kelas tidak boleh kosong');
  if (allRecords.length >= 999) return showSave("Limit tercapai!");
  
  const result = await window.dataSdk.create({ type: 'kelas', nama, kelas: '', mapel: '', guru: '', jam_ke: 0, hadir: false, keterangan: '', tanggal: '' });
  if (result.isOk) {
    document.getElementById('kelas-input').value = '';
    showSave("Kelas ditambahkan");
  }
});

function renderKelasList() {
  const list = document.getElementById('kelas-list');
  const kelas = allRecords.filter(r => r.type === 'kelas');
  list.innerHTML = kelas.map(k => `
    <tr class="border-b border-slate-100">
      <td class="px-4 py-3">${k.nama}</td>
      <td class="px-4 py-3 text-center">
        <button class="px-3 py-1 bg-red-500 text-white rounded text-xs hover:bg-red-600" onclick="deleteRecord('${k.__backendId}')">
          <i data-lucide="trash-2" class="w-3 h-3 inline"></i> Hapus
        </button>
      </td>
    </tr>
  `).join('') || '<tr><td colspan="2" class="p-4 text-center text-slate-400">Tidak ada kelas</td></tr>';
  lucide.createIcons();
}

// GURU FUNCTIONS
document.getElementById('btn-add-guru').addEventListener('click', async () => {
  const nama = document.getElementById('guru-input').value.trim();
  if (!nama) return alert('Nama guru tidak boleh kosong');
  if (allRecords.length >= 999) return showSave("Limit tercapai!");

  const result = await window.dataSdk.create({ type: 'guru', nama, kelas: '', mapel: '', guru: '', jam_ke: 0, hadir: false, keterangan: '', tanggal: '' });
  if (result.isOk) {
    document.getElementById('guru-input').value = '';
    showSave("Guru ditambahkan");
  }
});

function renderGuruList() {
  const list = document.getElementById('guru-list');
  const guru = allRecords.filter(r => r.type === 'guru');
  list.innerHTML = guru.map(g => `
    <tr class="border-b border-slate-100">
      <td class="px-4 py-3">${g.nama}</td>
      <td class="px-4 py-3 text-center">
        <button class="px-3 py-1 bg-red-500 text-white rounded text-xs hover:bg-red-600" onclick="deleteRecord('${g.__backendId}')">
          <i data-lucide="trash-2" class="w-3 h-3 inline"></i> Hapus
        </button>
      </td>
    </tr>
  `).join('') || '<tr><td colspan="2" class="p-4 text-center text-slate-400">Tidak ada guru</td></tr>';
  lucide.createIcons();
}

// JADWAL FUNCTIONS
function updateJadwalSelects() {
  const kelasSel = document.getElementById('jadwal-kelas');
  const guruSel = document.getElementById('jadwal-guru');
  const kelas = allRecords.filter(r => r.type === 'kelas');
  const guru = allRecords.filter(r => r.type === 'guru');
  
  kelasSel.innerHTML = '<option value="">-- Pilih Kelas --</option>' + kelas.map(k => `<option value="${k.nama}">${k.nama}</option>`).join('');
  guruSel.innerHTML = '<option value="">-- Pilih Guru --</option>' + guru.map(g => `<option value="${g.nama}">${g.nama}</option>`).join('');
}

document.getElementById('btn-add-jadwal').addEventListener('click', async () => {
  const kelas = document.getElementById('jadwal-kelas').value;
  const guru = document.getElementById('jadwal-guru').value;
  const mapel = document.getElementById('jadwal-mapel').value.trim();
  const jam_ke = parseInt(document.getElementById('jadwal-jam').value);

  if (!kelas || !guru || !mapel || !jam_ke) return alert('Semua field harus diisi');
  if (allRecords.length >= 999) return showSave("Limit tercapai!");
  
  const result = await window.dataSdk.create({ 
    type: 'jadwal', 
    kelas, 
    guru, 
    mapel, 
    jam_ke,
    nama: '', hadir: false, keterangan: '', tanggal: ''
  });
  
  if (result.isOk) {
    document.getElementById('jadwal-mapel').value = '';
    document.getElementById('jadwal-jam').value = '';
    showSave("Jadwal ditambahkan");
  }
});

function renderJadwalList() {
  const list = document.getElementById('jadwal-list');
  const jadwal = allRecords.filter(r => r.type === 'jadwal').sort((a, b) => a.jam_ke - b.jam_ke);
  list.innerHTML = jadwal.map(j => `
    <tr class="border-b border-slate-100">
      <td class="px-4 py-3">${j.kelas}</td>
      <td class="px-4 py-3">${j.jam_ke}</td>
      <td class="px-4 py-3">${j.mapel}</td>
      <td class="px-4 py-3">${j.guru}</td>
      <td class="px-4 py-3 text-center">
        <button class="px-3 py-1 bg-red-500 text-white rounded text-xs hover:bg-red-600" onclick="deleteRecord('${j.__backendId}')">
          <i data-lucide="trash-2" class="w-3 h-3 inline"></i> Hapus
        </button>
      </td>
    </tr>
  `).join('') || '<tr><td colspan="5" class="p-4 text-center text-slate-400">Tidak ada jadwal</td></tr>';
  lucide.createIcons();
}

// DELETE FUNCTION
async function deleteRecord(id) {
  const record = allRecords.find(r => r.__backendId === id);
  if (!record) return;
  const type = record.type;
  const result = await window.dataSdk.delete(record);
  if (result.isOk) {
    showSave("Data dihapus");
    // Auto refresh active context list after deletion
    if (type === 'kelas') renderKelasList();
    if (type === 'guru') renderGuruList();
    if (type === 'jadwal') renderJadwalList();
  }
}

// GURU VIEW - ABSENSI LOGIC
document.getElementById('kelas-select').addEventListener('change', (e) => {
  selectedKelas = e.target.value;
  renderGuruTable();
});

document.getElementById('date-picker').addEventListener('change', (e) => {
  selectedDate = e.target.value;
  renderGuruTable();
});

function renderGuruTable() {
  const tbody = document.getElementById('table-body');
  if (!selectedKelas) {
    tbody.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-slate-400">Silahkan pilih kelas terlebih dahulu untuk menampilkan jadwal.</td></tr>';
    return;
  }

  const jadwal = allRecords.filter(r => r.type === 'jadwal' && r.kelas === selectedKelas).sort((a, b) => a.jam_ke - b.jam_ke);
  
  tbody.innerHTML = jadwal.map(j => {
    const record = allRecords.find(r => r.type === 'absensi' && r.guru === j.guru && r.kelas === j.kelas && r.tanggal === selectedDate && r.jam_ke === j.jam_ke);
    const hadir = record ? record.hadir : false;
    const keterangan = record ? record.keterangan : "Masuk";
    
    return `
      <tr class="border-b border-slate-100 hover:bg-slate-50">
        <td class="px-4 py-3 font-medium">${j.jam_ke}</td>
        <td class="px-4 py-3">${j.mapel}</td>
        <td class="px-4 py-3">${j.guru}</td>
        <td class="px-4 py-3 text-center">
          <input type="checkbox" class="chk-hadir w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer" ${hadir ? 'checked' : ''} data-kelas="${j.kelas}" data-guru="${j.guru}" data-jam="${j.jam_ke}" data-mapel="${j.mapel}" onchange="saveAbsensi(this)">
        </td>
        <td class="px-4 py-3">
          <select class="sel-ket border border-slate-200 rounded-lg px-2 py-1.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500" data-kelas="${j.kelas}" data-guru="${j.guru}" data-jam="${j.jam_ke}" onchange="saveAbsensi(this)">
            <option value="Masuk" ${keterangan==='Masuk'?'selected':''}>Masuk</option>
            <option value="Sakit" ${keterangan==='Sakit'?'selected':''}>Sakit</option>
            <option value="Izin" ${keterangan==='Izin'?'selected':''}>Izin</option>
            <option value="Alpha" ${keterangan==='Alpha'?'selected':''}>Alpha</option>
            <option value="Terlambat" ${keterangan==='Terlambat'?'selected':''}>Terlambat</option>
          </select>
        </td>
      </tr>
    `;
  }).join('') || '<tr><td colspan="5" class="p-8 text-center text-slate-400">Tidak ada jadwal untuk kelas ini</td></tr>';
  lucide.createIcons();
}

async function saveAbsensi(el) {
  const row = el.closest('tr');
  const kelas = el.dataset.kelas;
  const guru = el.dataset.guru;
  const jam = parseInt(el.dataset.jam);
  const hadir = row.querySelector('.chk-hadir').checked;
  const keterangan = row.querySelector('.sel-ket').value;
  
  const existing = allRecords.find(r => r.type === 'absensi' && r.kelas === kelas && r.guru === guru && r.jam_ke === jam && r.tanggal === selectedDate);
  
  let result;
  if (existing) {
    result = await window.dataSdk.update({ ...existing, hadir, keterangan });
  } else {
    if (allRecords.length >= 999) return showSave("Limit tercapai!");
    result = await window.dataSdk.create({
      type: 'absensi',
      kelas,
      guru,
      jam_ke: jam,
      mapel: row.cells[1].textContent,
      hadir,
      keterangan,
      tanggal: selectedDate,
      nama: ''
    });
  }
  if (result.isOk) showSave("Tersimpan");
}

function showSave(text) {
  const el = document.getElementById('save-indicator');
  el.innerHTML = `<i data-lucide="check" class="w-4 h-4 inline mr-1"></i> ${text}`;
  el.style.opacity = '1';
  lucide.createIcons();
  setTimeout(() => el.style.opacity = '0', 1500);
}

function renderAdminView() {
  document.getElementById('kelas-tab').classList.remove('hidden');
  document.getElementById('guru-tab').classList.add('hidden');
  document.getElementById('jadwal-tab').classList.add('hidden');
  renderKelasList();
}

function initGuruView() {
  const kelas = allRecords.filter(r => r.type === 'kelas');
  const select = document.getElementById('kelas-select');
  select.innerHTML = '<option value="">-- Pilih Kelas --</option>' + kelas.map(k => `<option value="${k.nama}" ${k.nama === selectedKelas ? 'selected' : ''}>${k.nama}</option>`).join('');
}

// Data SDK Handler
const dataHandler = {
  onDataChanged(data) {
    allRecords = data;
    if (!isAdminLoggedIn) {
      initGuruView();
      renderGuruTable();
    } else {
      // Re-render current open tab inside admin view
      if (!document.getElementById('kelas-tab').classList.contains('hidden')) renderKelasList();
      if (!document.getElementById('guru-tab').classList.contains('hidden')) renderGuruList();
      if (!document.getElementById('jadwal-tab').classList.contains('hidden')) { renderJadwalList(); updateJadwalSelects(); }
    }
  }
};

// Element SDK Config
window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => {
    document.getElementById('page-title').textContent = config.page_title || defaultConfig.page_title;
    const app = document.getElementById('app');
    app.style.backgroundColor = config.background_color || defaultConfig.background_color;
    const font = config.font_family || defaultConfig.font_family;
    document.body.style.fontFamily = `${font}, sans-serif`;
    const size = config.font_size || defaultConfig.font_size;
    document.body.style.fontSize = size + 'px';
  },
  mapToCapabilities: (config) => ({
    recolorables: [
      { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
      { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
      { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
      { get: () => config.primary_color || defaultConfig.primary_color, set: (v) => { config.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); } },
      { get: () => config.secondary_color || defaultConfig.secondary_color, set: (v) => { config.secondary_color = v; window.elementSdk.setConfig({ secondary_color: v }); } },
    ],
    borderables: [],
    fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
    fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } },
  }),
  mapToEditPanelValues: (config) => new Map([
    ["page_title", config.page_title || defaultConfig.page_title],
  ])
});

window.dataSdk.init(dataHandler);
lucide.createIcons();
  </script>
 </body>
</html>
