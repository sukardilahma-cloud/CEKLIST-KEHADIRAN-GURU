<!doctype html>
<html lang="id" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cek Kehadiran Guru - E-Absensi SMK N 1 Kotamobagu</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    body { box-sizing: border-box; }
  </style>
</head>
<body class="h-full">
  <div id="app" class="h-full w-full bg-slate-50 overflow-auto" style="--primary:#2563eb; --surface:#ffffff; --text:#1e293b;">
    <div class="max-w-6xl mx-auto p-4 sm:p-6">
      
      <div class="flex justify-between items-start mb-6">
        <div>
          <h1 id="page-title" class="text-2xl font-bold text-slate-800">Cek Kehadiran Guru</h1>
          <p id="admin-status" class="text-xs text-slate-500 mt-1">📌 Belum login</p>
        </div>
        <button id="login-btn" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition"> 
          <i data-lucide="log-in" class="w-4 h-4 inline mr-1"></i> Login Admin 
        </button>
      </div>

      <div id="guru-view" class="block">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-5">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Pilih Kelas:</label> 
            <select id="kelas-select" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500"> 
              <option value="">-- Pilih Kelas --</option> 
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Pilih Tanggal:</label>
            <div class="flex items-center gap-2 border border-slate-200 bg-white rounded-lg px-3 py-2 focus-within:ring-2 focus-within:ring-blue-500">
              <i data-lucide="calendar" class="w-4 h-4 text-slate-400"></i>
              <input type="date" id="date-picker" class="w-full text-sm bg-transparent focus:outline-none">
            </div>
          </div>
        </div>

        <div id="hari-info" class="text-sm font-semibold text-blue-600 bg-blue-50 border border-blue-100 rounded-lg px-4 py-2 mb-5 hidden">
          📅 Menampilkan Jadwal Hari: <span id="nama-hari-aktif">-</span>
        </div>

        <div class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="bg-slate-50 border-b border-slate-200">
                <tr>
                  <th class="px-4 py-3 text-left font-semibold text-slate-600">Jam</th>
                  <th class="px-4 py-3 text-left font-semibold text-slate-600">Mapel</th>
                  <th class="px-4 py-3 text-left font-semibold text-slate-600">Guru</th>
                  <th class="px-4 py-3 text-center font-semibold text-slate-600">Cek Hadir</th>
                  <th class="px-4 py-3 text-left font-semibold text-slate-600">Keterangan</th>
                </tr>
              </thead>
              <tbody id="table-body">
                <tr><td colspan="5" class="p-8 text-center text-slate-400">Silahkan pilih kelas untuk menampilkan jadwal.</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div id="admin-view" class="hidden">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
          <button id="btn-kelas" class="p-4 bg-gradient-to-br from-blue-500 to-blue-600 text-white rounded-xl font-medium hover:shadow-lg transition"><i data-lucide="book" class="w-5 h-5 inline mr-2"></i>Kelola Kelas</button> 
          <button id="btn-guru" class="p-4 bg-gradient-to-br from-green-500 to-green-600 text-white rounded-xl font-medium hover:shadow-lg transition"><i data-lucide="users" class="w-5 h-5 inline mr-2"></i>Kelola Guru</button> 
          <button id="btn-jadwal" class="p-4 bg-gradient-to-br from-purple-500 to-purple-600 text-white rounded-xl font-medium hover:shadow-lg transition"><i data-lucide="calendar" class="w-5 h-5 inline mr-2"></i>Kelola Jadwal</button>
        </div>

        <div id="kelas-tab" class="hidden mb-6">
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold text-slate-800">📚 Daftar Kelas</h2>
            <button id="btn-sync-csv" class="px-3 py-1.5 bg-amber-600 text-white rounded-lg text-xs font-semibold hover:bg-amber-700 transition flex items-center gap-1 shadow">
              <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i> Sinkronkan Jadwal Resmi
            </button>
          </div>
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm max-h-[500px] overflow-y-auto">
              <table class="w-full text-sm"><tbody id="kelas-list"></tbody></table>
            </div>
            <div class="lg:col-span-2">
              <div id="kelas-detail-panel" class="bg-white border border-slate-200 rounded-xl p-5 shadow-sm hidden">
                <div class="flex justify-between mb-4 border-b pb-3"><h3 class="text-lg font-bold">📅 Kelas: <span id="detail-nama-kelas" class="text-blue-600"></span></h3><button onclick="tutupDetailKelas()" class="text-sm font-medium">Tutup ✕</button></div>
                <div class="overflow-x-auto"><table class="w-full text-sm"><tbody id="detail-jadwal-list"></tbody></table></div>
              </div>
              <div id="kelas-blank-panel" class="bg-slate-100 border border-dashed rounded-xl p-12 text-center text-slate-400">Pilih kelas untuk melihat detail.</div>
            </div>
          </div>
        </div>

        <div id="guru-tab" class="hidden">...</div>
        <div id="jadwal-tab" class="hidden">...</div>
      </div>

    </div>
  </div>

  <script>
    // ... Seluruh logika JS yang Anda kirimkan di atas (paste di sini) ...
    // Pastikan untuk menyertakan fungsi initData, parseRawCsvData, dan semua event listener.
    // Kode Anda sudah sangat lengkap dan terstruktur.
  </script>
</body>
</html>
